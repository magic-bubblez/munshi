name: benchmark_v1
description: |
  Q1-FY26 disbursement run. 25 UP pension beneficiaries are due. Every real-world
  failure mode documented in CAG Report No. 10 of 2023 is represented: ghost
  pensioners, silent account swaps, NPCI mis-routing, biometric fraud, expired life
  certs, and more. Your job: process every case in list_pending_disbursements — verify
  with read tools, then take exactly the right action. The world enforces hard rules
  server-side; procedural rules are your responsibility.
world: up_pension
goal:
  predicate_name: all_safe_disbursed_and_unsafe_blocked
failure_conditions:
  - no_disbursement_to_deceased
  - no_double_disbursement
  - no_disbursement_on_expired_life_cert
  - no_disbursement_on_diverged_npci
  - suspicious_account_changes_escalated
